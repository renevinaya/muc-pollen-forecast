AWSTemplateFormatVersion: '2010-09-09'
Description: Munich Pollen Forecast Infrastructure (Python/ML)

Parameters:
  GitHubRepo:
    Type: String
    Description: GitHub repository URL
    Default: https://github.com/renevinaya/muc-pollen-forecast.git

  ForecastSchedule:
    Type: String
    Description: Schedule for forecast updates (every 3 hours)
    Default: cron(0 2,5,8,11,14,17,20,23 * * ? *)

  TrainSchedule:
    Type: String
    Description: Schedule for monthly model training (1st of month, 4 AM UTC)
    Default: cron(0 4 1 * ? *)

Resources:
  # S3 Bucket for forecast data + historical data + model artifacts
  ForecastBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: muc-pollen-forecast
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: false
        IgnorePublicAcls: true
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET]
            AllowedOrigins: ['*']
            MaxAge: 3600
      LifecycleConfiguration:
        Rules:
          - Id: CleanUpOldData
            Status: Enabled
            Prefix: data/
            ExpirationInDays: 730  # Keep 2 years of history
      Tags:
        - Key: project
          Value: muc-pollen

  ForecastBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ForecastBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${ForecastBucket.Arn}/forecast.json
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${ForecastDistribution}

  # CloudFront Origin Access Control
  ForecastOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: muc-pollen-forecast-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Distribution
  ForecastDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: forecast.json
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt ForecastBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt ForecastOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: 60669652-455b-4ae9-85a4-c4c02393f86c
          Compress: true
        WebACLId: arn:aws:wafv2:us-east-1:844563760497:global/webacl/CreatedByCloudFront-2d6806e0/43cf304c-e0ee-40e9-8b1d-9dbc54f48c11
      Tags:
        - Key: project
          Value: muc-pollen

  # IAM Role for CodeBuild
  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: project
          Value: muc-pollen
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub ${ForecastBucket.Arn}
                  - !Sub ${ForecastBucket.Arn}/*

  # CodeBuild Project
  ForecastCodeBuild:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: muc-pollen-forecast
      Description: Daily ML pollen forecast generator
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: ARM_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-aarch64-standard:3.0
        EnvironmentVariables:
          - Name: S3_BUCKET
            Value: !Ref ForecastBucket
          - Name: AWS_DEFAULT_REGION
            Value: eu-central-1
          - Name: RUN_MODE
            Value: forecast
      Source:
        Type: GITHUB
        Location: !Ref GitHubRepo
        BuildSpec: buildspec.yml
      TimeoutInMinutes: 15
      Tags:
        - Key: project
          Value: muc-pollen

  # EventBridge Rule for 3-hourly forecast
  ForecastScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: muc-pollen-forecast-3h
      Description: Trigger forecast generation every 3 hours
      ScheduleExpression: !Ref ForecastSchedule
      State: ENABLED
      Targets:
        - Id: ForecastCodeBuild
          Arn: !GetAtt ForecastCodeBuild.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn
          Input: '{"environmentVariablesOverride": [{"name": "RUN_MODE", "value": "forecast", "type": "PLAINTEXT"}]}'

  # EventBridge Rule for monthly training
  TrainScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: muc-pollen-forecast-monthly-train
      Description: Trigger model training on 1st of each month
      ScheduleExpression: !Ref TrainSchedule
      State: ENABLED
      Targets:
        - Id: TrainCodeBuild
          Arn: !GetAtt ForecastCodeBuild.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn
          Input: '{"environmentVariablesOverride": [{"name": "RUN_MODE", "value": "train", "type": "PLAINTEXT"}]}'

  # IAM Role for EventBridge
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: project
          Value: muc-pollen
      Policies:
        - PolicyName: StartCodeBuild
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: codebuild:StartBuild
                Resource: !GetAtt ForecastCodeBuild.Arn

  # IAM Role for EventBridge to trigger training
  EventBridgeTrainRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: project
          Value: muc-pollen
      Policies:
        - PolicyName: StartCodeBuild
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: codebuild:StartBuild
                Resource: !GetAtt ForecastCodeBuild.Arn

Outputs:
  ForecastBucketName:
    Description: S3 bucket storing forecast + history + models
    Value: !Ref ForecastBucket

  CloudFrontURL:
    Description: CloudFront URL for forecast data
    Value: !Sub https://${ForecastDistribution.DomainName}/forecast.json

  CodeBuildProject:
    Description: CodeBuild project name
    Value: !Ref ForecastCodeBuild
